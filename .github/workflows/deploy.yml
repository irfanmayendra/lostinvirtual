name: Deploy to VPS

on:
  push:
    branches:
      - main
      - staging
      - dev

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy based on branch
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            export PORT=3001
            export ENV=prod
          elif [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            export PORT=3002
            export ENV=staging
          else
            export PORT=3003
            export ENV=dev
          fi
          
          # Use docker-compose with specific profile/env
          docker compose -p lostinvirtual-$ENV up -d --build
          
          echo "Deployed to port $PORT (Environment: $ENV)"
